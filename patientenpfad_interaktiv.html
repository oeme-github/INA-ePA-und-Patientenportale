<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patientenpfad – Interaktive Prozesskarte</title>
  <style>
    :root {
      --color-text-primary: #111827;
      --color-text-secondary: #374151;
      --color-text-tertiary: #6B7280;
      --color-background-primary: #ffffff;
      --color-background-secondary: #F9FAFB;
      --color-border-primary: #9CA3AF;
      --color-border-secondary: #D1D5DB;
      --color-border-tertiary: #E5E7EB;
      --border-radius-md: 6px;
      --border-radius-lg: 10px;
    }

    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F3F4F6;
      color: var(--color-text-primary);
      margin: 0;
      padding: 24px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 4px 0;
    }

    .subtitle {
      font-size: 13px;
      color: var(--color-text-tertiary);
      margin: 0 0 24px 0;
    }

    .toolbar {
      background: var(--color-background-primary);
      border: 1px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      padding: 14px 16px;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .toolbar-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .toolbar-label {
      font-size: 12px;
      color: var(--color-text-tertiary);
      white-space: nowrap;
    }

    .phase-tab {
      padding: 6px 14px;
      border: 1px solid var(--color-border-secondary);
      border-radius: var(--border-radius-md);
      background: transparent;
      color: var(--color-text-secondary);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
    }
    .phase-tab.active {
      color: var(--color-text-primary);
      border-color: var(--color-border-primary);
      background: var(--color-background-secondary);
    }
    .phase-tab:hover:not(.active) {
      border-color: var(--color-border-primary);
    }

    .dr-toggle {
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid transparent;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      opacity: 0.4;
    }
    .dr-toggle.active { opacity: 1; }
    .dr-portal    { background: #E6F1FB; color: #0C447C; border-color: #185FA5; }
    .dr-versorgung{ background: #E1F5EE; color: #085041; border-color: #0F6E56; }
    .dr-epa       { background: #EEEDFE; color: #3C3489; border-color: #534AB7; }
    .dr-ehds      { background: #FAECE7; color: #712B13; border-color: #993C1D; }

    .counter {
      font-size: 12px;
      color: var(--color-text-tertiary);
      margin-bottom: 12px;
    }
    .counter strong { color: var(--color-text-secondary); }

    #karten {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
    }

    .prozess-card {
      background: var(--color-background-primary);
      border: 1px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .prozess-card:hover { border-color: var(--color-border-primary); box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .prozess-card.dimmed { opacity: 0.2; pointer-events: none; }

    .phase-vor  { border-left: 3px solid #1D9E75; }
    .phase-im   { border-left: 3px solid #534AB7; }
    .phase-nach { border-left: 3px solid #993C1D; }

    .card-meta {
      font-size: 11px;
      color: var(--color-text-tertiary);
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
    }

    .card-titel {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-text-primary);
      margin-bottom: 5px;
    }

    .card-akteur {
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-bottom: 4px;
    }

    .card-objekt {
      font-size: 12px;
      color: var(--color-text-tertiary);
      margin-bottom: 10px;
    }

    .dr-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      margin-right: 4px;
      margin-bottom: 2px;
    }

    .detail-box {
      background: var(--color-background-secondary);
      border-radius: var(--border-radius-md);
      padding: 14px 16px;
      margin-top: 10px;
      font-size: 13px;
      color: var(--color-text-secondary);
      line-height: 1.6;
      border: 1px solid var(--color-border-tertiary);
    }

    .detail-section {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--color-border-tertiary);
    }

    .detail-section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--color-text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .gesetz-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      margin-right: 4px;
      margin-bottom: 4px;
      background: #F3F4F6;
      color: #374151;
      border: 1px solid #D1D5DB;
    }

    .domaene-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      background: #FEF9C3;
      color: #713F12;
      border: 1px solid #FDE047;
    }

    @media print {
      body { background: white; padding: 0; }
      .toolbar { display: none; }
      .prozess-card { break-inside: avoid; cursor: default; }
      .prozess-card.dimmed { display: none; }
    }
  </style>
</head>
<body>

  <h1>Patientenpfad – Interaktive Prozesskarte</h1>
  <p class="subtitle">Akteur × Prozess → Datenobjekt &nbsp;·&nbsp; 25 Prozessschritte in 3 Phasen</p>

  <div class="toolbar">
    <div class="toolbar-row">
      <span class="toolbar-label">Phase:</span>
      <button class="phase-tab active" onclick="setPhase('alle')">Alle Phasen</button>
      <button class="phase-tab" onclick="setPhase('vor')">Vor dem Krankenhaus</button>
      <button class="phase-tab" onclick="setPhase('im')">Im Krankenhaus</button>
      <button class="phase-tab" onclick="setPhase('nach')">Nach dem Krankenhaus</button>
    </div>
    <div class="toolbar-row">
      <span class="toolbar-label">Datenraum:</span>
      <button class="dr-toggle dr-portal active"     data-dr="portal"     onclick="toggleDR('portal')">Portal</button>
      <button class="dr-toggle dr-versorgung active" data-dr="versorgung" onclick="toggleDR('versorgung')">Versorgung</button>
      <button class="dr-toggle dr-epa active"        data-dr="epa"        onclick="toggleDR('epa')">ePA</button>
      <button class="dr-toggle dr-ehds active"       data-dr="ehds"       onclick="toggleDR('ehds')">EHDS</button>
    </div>
  </div>

  <div class="counter" id="counter"></div>
  <div id="karten"></div>

  <script src="patientenpfad_data.js"></script>
  <script>
    const drBadgeClass = { portal:'dr-portal', versorgung:'dr-versorgung', epa:'dr-epa', ehds:'dr-ehds' };
    const drLabel      = { portal:'Portal', versorgung:'Versorgung', epa:'ePA', ehds:'EHDS' };
    const phaseLabel   = { vor:'Vor dem Krankenhaus', im:'Im Krankenhaus', nach:'Nach dem Krankenhaus' };
    const phaseBorder  = { vor:'phase-vor', im:'phase-im', nach:'phase-nach' };

    let activePhase = 'alle';
    let activeDR    = new Set(['portal','versorgung','epa','ehds']);
    let openCard    = null;

    function setPhase(p) {
      activePhase = p;
      document.querySelectorAll('.phase-tab').forEach((t, i) => {
        t.classList.toggle('active', ['alle','vor','im','nach'][i] === p);
      });
      render();
    }

    function toggleDR(dr) {
      activeDR.has(dr) ? activeDR.delete(dr) : activeDR.add(dr);
      document.querySelector(`[data-dr="${dr}"]`).classList.toggle('active', activeDR.has(dr));
      render();
    }

    function toggleDetail(nr) {
      openCard = openCard === nr ? null : nr;
      render();
    }

    function render() {
      const filtered = data.filter(d => {
        if (activePhase !== 'alle' && d.phase !== activePhase) return false;
        return true;
      });

      const visible = filtered.filter(d => d.dr.some(r => activeDR.has(r)));

      document.getElementById('counter').innerHTML =
        `<strong>${visible.length} von ${data.length}</strong> Prozessschritten sichtbar`;

      document.getElementById('karten').innerHTML = filtered.map(d => {
        const hasDR  = d.dr.some(r => activeDR.has(r));
        const badges = d.dr.map(r => `<span class="dr-badge ${drBadgeClass[r]}">${drLabel[r]}</span>`).join('');
        const isOpen = openCard === d.nr;

        let detail = '';
        if (isOpen) {
          const gesetze = d.gesetze && d.gesetze.length
            ? d.gesetze.map(g => `<span class="gesetz-badge">${g}</span>`).join('')
            : '<span style="color:var(--color-text-tertiary);font-size:12px;">–</span>';

          const domaene = d.domäne
            ? `<span class="domaene-badge">${d.domäne}</span>`
            : '<span style="color:var(--color-text-tertiary);font-size:12px;">–</span>';

          detail = `
            <div class="detail-box">
              <div>${d.detail}</div>
              <div class="detail-section">
                <div class="detail-section-label">Informationsdomäne</div>
                ${domaene}
              </div>
              <div class="detail-section">
                <div class="detail-section-label">Rechtsgrundlagen (Entwurf)</div>
                ${gesetze}
              </div>
            </div>`;
        }

        return `
          <div class="prozess-card ${phaseBorder[d.phase]} ${hasDR ? '' : 'dimmed'}"
               onclick="toggleDetail(${d.nr})">
            <div class="card-meta">
              <span>${phaseLabel[d.phase]}</span>
              <span>#${d.nr}</span>
            </div>
            <div class="card-titel">${d.titel}</div>
            <div class="card-akteur">${d.akteur}</div>
            <div class="card-objekt">${d.objekt} <span style="opacity:0.6;">(${d.op})</span></div>
            <div>${badges}</div>
            ${detail}
          </div>`;
      }).join('');
    }

    render();
  </script>
</body>
</html>
