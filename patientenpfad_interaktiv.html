<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patientenpfad – Interaktive Prozesskarte</title>
  <style>
    :root {
      --c-text-1:   #111827;
      --c-text-2:   #374151;
      --c-text-3:   #6B7280;
      --c-text-4:   #9CA3AF;
      --c-bg:       #F3F4F6;
      --c-surface:  #ffffff;
      --c-border-1: #E5E7EB;
      --c-border-2: #D1D5DB;
      --c-border-3: #9CA3AF;
      --r-sm: 6px;
      --r-md: 8px;
      --r-lg: 12px;

      --phase-vor:  #059669;
      --phase-im:   #4F46E5;
      --phase-nach: #B45309;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--c-bg);
      color: var(--c-text-1);
      min-height: 100vh;
    }

    /* ── Header ── */
    .page-header {
      background: var(--c-surface);
      border-bottom: 1px solid var(--c-border-1);
      padding: 16px 24px 14px;
    }
    .page-header h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .page-header p {
      font-size: 12px;
      color: var(--c-text-3);
      margin-top: 3px;
    }

    /* ── Toolbar ── */
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--c-surface);
      border-bottom: 1px solid var(--c-border-1);
      padding: 12px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--c-text-4);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      min-width: 110px;
    }

    /* Phase-Tabs */
    .phase-tab {
      padding: 5px 13px;
      border: 1px solid var(--c-border-2);
      border-radius: var(--r-sm);
      background: transparent;
      color: var(--c-text-3);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.12s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .phase-tab:hover:not(.active) {
      border-color: var(--c-border-3);
      color: var(--c-text-2);
    }
    .phase-tab.active {
      background: var(--c-text-1);
      border-color: var(--c-text-1);
      color: #fff;
    }
    .phase-tab .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Datenraum-Toggles */
    .dr-toggle {
      padding: 4px 11px;
      border-radius: 20px;
      border: 1px solid transparent;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.12s;
      opacity: 0.35;
    }
    .dr-toggle.active { opacity: 1; }
    .dr-portal     { background: #DBEAFE; color: #1E40AF; border-color: #3B82F6; }
    .dr-versorgung { background: #D1FAE5; color: #065F46; border-color: #10B981; }
    .dr-epa        { background: #EDE9FE; color: #4C1D95; border-color: #7C3AED; }
    .dr-ehds       { background: #FEE2E2; color: #7F1D1D; border-color: #EF4444; }

    /* Rechtsgrundlagen-Toggles */
    .law-toggle {
      padding: 4px 10px;
      border-radius: var(--r-sm);
      border: 1px solid var(--c-border-2);
      background: var(--c-surface);
      color: var(--c-text-3);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s;
      opacity: 0.45;
    }
    .law-toggle.active {
      background: #F0FDF4;
      border-color: #4ADE80;
      color: #14532D;
      opacity: 1;
    }
    .law-toggle:hover:not(.active) {
      border-color: var(--c-border-3);
      color: var(--c-text-2);
      opacity: 0.8;
    }

    /* ── Hauptbereich ── */
    .main {
      padding: 20px 24px;
    }

    .counter {
      font-size: 12px;
      color: var(--c-text-3);
      margin-bottom: 14px;
    }
    .counter strong { color: var(--c-text-2); font-weight: 600; }

    /* ── Phasen-Abschnitte ── */
    .phase-section { margin-bottom: 32px; }

    .phase-section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-radius: var(--r-md);
      margin-bottom: 14px;
      border-left: 4px solid transparent;
    }
    .phase-section-header.phase-vor  { background: #F0FDF4; border-color: var(--phase-vor); }
    .phase-section-header.phase-im   { background: #F5F3FF; border-color: var(--phase-im); }
    .phase-section-header.phase-nach { background: #FFFBEB; border-color: var(--phase-nach); }

    .phase-section-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .phase-section-header.phase-vor  .phase-section-title { color: #065F46; }
    .phase-section-header.phase-im   .phase-section-title { color: #3730A3; }
    .phase-section-header.phase-nach .phase-section-title { color: #78350F; }

    .phase-section-count {
      margin-left: auto;
      font-size: 12px;
      font-weight: 500;
      color: var(--c-text-4);
    }

    /* ── Karten-Grid ── */
    .phase-section-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
    }

    .prozess-card {
      background: var(--c-surface);
      border: 1px solid var(--c-border-1);
      border-radius: var(--r-lg);
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color 0.12s, box-shadow 0.12s, opacity 0.15s;
      position: relative;
    }
    .prozess-card:hover {
      border-color: var(--c-border-3);
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .prozess-card.dimmed {
      opacity: 0.18;
      pointer-events: none;
    }
    .prozess-card.open {
      border-color: var(--c-border-3);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .phase-vor  { border-left: 3px solid var(--phase-vor); }
    .phase-im   { border-left: 3px solid var(--phase-im); }
    .phase-nach { border-left: 3px solid var(--phase-nach); }

    .card-meta {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 6px;
    }

    .card-nr {
      font-size: 11px;
      font-weight: 600;
      color: var(--c-text-4);
    }

    .card-titel {
      font-size: 14px;
      font-weight: 600;
      color: var(--c-text-1);
      line-height: 1.35;
      margin-bottom: 5px;
    }

    .card-akteur {
      font-size: 12px;
      color: var(--c-text-3);
      margin-bottom: 3px;
    }

    .card-objekt {
      font-size: 12px;
      color: var(--c-text-3);
      margin-bottom: 10px;
    }
    .card-op {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 4px;
      background: #F3F4F6;
      color: var(--c-text-3);
      border: 1px solid var(--c-border-2);
      margin-left: 4px;
      vertical-align: middle;
    }

    .card-badges { display: flex; flex-wrap: wrap; gap: 4px; }

    .dr-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }

    /* ── Detail-Box ── */
    .detail-box {
      margin-top: 12px;
      border-top: 1px solid var(--c-border-1);
      padding-top: 12px;
      font-size: 13px;
      color: var(--c-text-2);
      line-height: 1.65;
    }

    .detail-section {
      margin-top: 12px;
    }
    .detail-section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--c-text-4);
      margin-bottom: 6px;
    }

    .domaene-chip {
      display: inline-block;
      padding: 3px 10px;
      border-radius: var(--r-sm);
      font-size: 12px;
      font-weight: 500;
      background: #FEF9C3;
      color: #713F12;
      border: 1px solid #FDE68A;
    }

    .gesetz-chip {
      display: inline-block;
      padding: 3px 9px;
      border-radius: var(--r-sm);
      font-size: 11px;
      font-weight: 500;
      background: #F0FDF4;
      color: #14532D;
      border: 1px solid #BBF7D0;
      margin-right: 4px;
      margin-bottom: 4px;
    }

    .struktur-badge {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-left: 6px;
      vertical-align: middle;
    }
    .struktur-strukturiert   { background: #D1FAE5; color: #065F46; border: 1px solid #6EE7B7; }
    .struktur-teilstrukturiert { background: #FEF3C7; color: #78350F; border: 1px solid #FCD34D; }
    .struktur-unstrukturiert { background: #FEE2E2; color: #7F1D1D; border: 1px solid #FCA5A5; }

    .standard-chip {
      display: inline-block;
      padding: 3px 9px;
      border-radius: var(--r-sm);
      font-size: 11px;
      font-weight: 500;
      background: #EFF6FF;
      color: #1E40AF;
      border: 1px solid #BFDBFE;
      margin-right: 4px;
      margin-bottom: 4px;
    }

    /* ── Suche ── */
    .search-input {
      flex: 1;
      max-width: 340px;
      padding: 5px 10px;
      border: 1px solid var(--c-border-2);
      border-radius: var(--r-sm);
      font-size: 13px;
      font-family: inherit;
      color: var(--c-text-1);
      background: var(--c-surface);
      transition: border-color 0.12s;
    }
    .search-input:focus { outline: none; border-color: var(--c-border-3); }
    .search-input::placeholder { color: var(--c-text-4); }

    mark {
      background: #FEF08A;
      color: inherit;
      border-radius: 2px;
      padding: 0 1px;
    }

    /* ── Export-Bereich ── */
    .export-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .export-bar .counter {
      margin-bottom: 0;
      flex: 1;
    }
    .btn-export {
      padding: 5px 12px;
      border-radius: var(--r-sm);
      border: 1px solid var(--c-border-2);
      background: var(--c-surface);
      color: var(--c-text-2);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s;
    }
    .btn-export:hover { border-color: var(--c-border-3); color: var(--c-text-1); }

    /* ── Struktur-Toggles ── */
    .str-toggle {
      padding: 4px 10px;
      border-radius: var(--r-sm);
      border: 1px solid var(--c-border-2);
      background: var(--c-surface);
      color: var(--c-text-3);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s;
      opacity: 0.45;
    }
    .str-toggle.active                          { opacity: 1; }
    .str-toggle.active[data-str="strukturiert"]   { background: #D1FAE5; border-color: #6EE7B7; color: #065F46; }
    .str-toggle.active[data-str="teilstrukturiert"] { background: #FEF3C7; border-color: #FCD34D; color: #78350F; }
    .str-toggle.active[data-str="unstrukturiert"] { background: #FEE2E2; border-color: #FCA5A5; color: #7F1D1D; }
    .str-toggle:hover:not(.active) { border-color: var(--c-border-3); color: var(--c-text-2); opacity: 0.8; }

    /* ── Standard-Toggles ── */
    .std-toggle {
      padding: 4px 10px;
      border-radius: var(--r-sm);
      border: 1px solid var(--c-border-2);
      background: var(--c-surface);
      color: var(--c-text-3);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s;
      opacity: 0.45;
    }
    .std-toggle.active {
      background: #EFF6FF;
      border-color: #BFDBFE;
      color: #1E40AF;
      opacity: 1;
    }
    .std-toggle:hover:not(.active) { border-color: var(--c-border-3); color: var(--c-text-2); opacity: 0.8; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .modal-panel {
      background: var(--c-surface);
      border-radius: var(--r-lg);
      padding: 22px 24px 24px;
      max-width: 580px;
      width: 92%;
      max-height: 82vh;
      overflow-y: auto;
      box-shadow: 0 12px 40px rgba(0,0,0,0.22);
      position: relative;
      border-left: 4px solid transparent;
    }
    .modal-panel.phase-vor  { border-left-color: var(--phase-vor); }
    .modal-panel.phase-im   { border-left-color: var(--phase-im); }
    .modal-panel.phase-nach { border-left-color: var(--phase-nach); }
    .modal-close {
      position: absolute;
      top: 10px;
      right: 14px;
      background: none;
      border: none;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      color: var(--c-text-3);
      padding: 2px 6px;
      border-radius: var(--r-sm);
      font-family: inherit;
    }
    .modal-close:hover { color: var(--c-text-1); background: var(--c-bg); }
    .modal-nr   { font-size: 11px; font-weight: 600; color: var(--c-text-4); margin-bottom: 4px; }
    .modal-titel { font-size: 17px; font-weight: 700; color: var(--c-text-1); margin-bottom: 8px; line-height: 1.3; }
    .modal-meta  { font-size: 12px; color: var(--c-text-3); margin-bottom: 4px; }
    .modal-badges { display: flex; flex-wrap: wrap; gap: 4px; margin: 10px 0 14px; }
    .modal-divider { border: none; border-top: 1px solid var(--c-border-1); margin: 14px 0; }

    /* ── Print-Filterzeile ── */
    .print-filter-summary {
      display: none;
    }
    @media print {
      .print-filter-summary {
        display: block;
        font-size: 11px;
        color: #555;
        padding: 6px 0 10px;
        border-bottom: 1px solid #ddd;
        margin-bottom: 12px;
      }
    }

    /* ── View-Tabs ── */
    .view-tabs {
      background: var(--c-surface);
      border-bottom: 1px solid var(--c-border-1);
      padding: 0 24px;
      display: flex;
    }
    .view-tab {
      padding: 10px 18px;
      border: none;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: var(--c-text-3);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s;
      margin-bottom: -1px;
      font-family: inherit;
    }
    .view-tab:hover:not(.active) { color: var(--c-text-2); }
    .view-tab.active {
      color: var(--c-text-1);
      border-bottom-color: var(--c-text-1);
      font-weight: 600;
    }

    /* ── Matrix ── */
    .matrix-wrap {
      padding: 20px 24px;
      overflow-x: auto;
    }
    .matrix-table {
      border-collapse: collapse;
      width: 100%;
      font-size: 12px;
    }
    .matrix-table th {
      padding: 8px 14px;
      text-align: left;
      border-bottom: 2px solid var(--c-border-1);
      white-space: nowrap;
    }
    .matrix-table th:first-child {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--c-text-4);
      min-width: 140px;
    }
    .matrix-table td {
      padding: 8px 14px;
      vertical-align: top;
      border-bottom: 1px solid var(--c-border-1);
      min-width: 180px;
    }
    .matrix-domaene {
      font-weight: 600;
      font-size: 13px;
      color: var(--c-text-1);
      white-space: nowrap;
    }
    .matrix-step-chip {
      display: block;
      width: 100%;
      padding: 3px 8px;
      border-radius: var(--r-sm);
      font-size: 11px;
      font-weight: 500;
      background: var(--c-bg);
      border: 1px solid var(--c-border-2);
      color: var(--c-text-2);
      cursor: pointer;
      margin: 2px 0;
      transition: all 0.1s;
      text-align: left;
      font-family: inherit;
      line-height: 1.4;
    }
    .matrix-step-chip:hover {
      border-color: var(--c-border-3);
      color: var(--c-text-1);
      background: var(--c-surface);
    }
    .matrix-step-chip.phase-vor  { background: #D1FAE5; border-color: #6EE7B7; color: #065F46; }
    .matrix-step-chip.phase-im   { background: #EDE9FE; border-color: #A78BFA; color: #3730A3; }
    .matrix-step-chip.phase-nach { background: #FEF3C7; border-color: #FCD34D; color: #78350F; }
    .matrix-step-chip.highlighted {
      outline: 2px solid currentColor;
      font-weight: 700;
      opacity: 1 !important;
      filter: brightness(0.92);
    }
    .matrix-step-chip.dimmed-by-hover { opacity: 0.2; }

    /* ── Print ── */
    @media print {
      body { background: white; min-height: 0; }
      .page-header { position: static; box-shadow: none; border-bottom: 1px solid #ccc; padding: 8px 16px; }
      .toolbar, .export-bar { display: none !important; }
      .main { padding: 12px 0 0; }
      .phase-section { break-inside: auto; }
      .phase-section-header { box-shadow: none; break-after: avoid; }
      .prozess-card { break-inside: avoid; cursor: default; box-shadow: none; border: 1px solid #ddd; }
      .prozess-card.dimmed { display: none; }
      .detail-box { display: block !important; border-top: 1px solid #eee; padding-top: 10px; margin-top: 8px; }
      mark { background: none; font-weight: 600; }
    }
  </style>
</head>
<body>

  <div class="page-header">
    <h1>Patientenpfad – Interaktive Prozesskarte</h1>
    <p>Akteur &times; Prozess &rarr; Datenobjekt &nbsp;&middot;&nbsp; 25 Schritte &nbsp;&middot;&nbsp; 3 Phasen &nbsp;&middot;&nbsp; 4 Datenräume &nbsp;&middot;&nbsp; <a href="https://www.ina.gematik.de/mitwirken/arbeitskreise/rolle-von-patientenportalen-im-zusammenspiel-mit-primaersystemen-und-epa-1" target="_blank" style="color:inherit;opacity:0.6;text-decoration:none;">AK Patientenportale ↗</a></p>
  </div>

  <div class="view-tabs">
    <button class="view-tab active" onclick="switchView('karten')">Prozessschritte</button>
    <button class="view-tab" onclick="switchView('matrix')">Matrix</button>
  </div>

  <div class="print-filter-summary" id="print-filter-summary"></div>

  <div class="toolbar">
    <div class="filter-row">
      <span class="filter-label">Phase</span>
      <button class="phase-tab active" onclick="setPhase('alle')">Alle Phasen</button>
      <button class="phase-tab" onclick="setPhase('vor')">
        <span class="dot" style="background:var(--phase-vor)"></span>Vor dem Krankenhaus
      </button>
      <button class="phase-tab" onclick="setPhase('im')">
        <span class="dot" style="background:var(--phase-im)"></span>Im Krankenhaus
      </button>
      <button class="phase-tab" onclick="setPhase('nach')">
        <span class="dot" style="background:var(--phase-nach)"></span>Nach dem Krankenhaus
      </button>
    </div>
    <div class="filter-row">
      <span class="filter-label">Datenraum</span>
      <button class="dr-toggle dr-portal     active" data-dr="portal"     onclick="toggleDR('portal')">Portal</button>
      <button class="dr-toggle dr-versorgung active" data-dr="versorgung" onclick="toggleDR('versorgung')">Versorgung</button>
      <button class="dr-toggle dr-epa        active" data-dr="epa"        onclick="toggleDR('epa')">ePA</button>
      <button class="dr-toggle dr-ehds       active" data-dr="ehds"       onclick="toggleDR('ehds')">EHDS</button>
    </div>
    <div class="filter-row" id="str-filter-row">
      <span class="filter-label">Struktur</span>
      <!-- dynamisch befüllt -->
    </div>
    <div class="filter-row" id="law-filter-row">
      <span class="filter-label">Rechtsgrundlage</span>
      <!-- dynamisch befüllt -->
    </div>
    <div class="filter-row" id="std-filter-row">
      <span class="filter-label">Standard</span>
      <!-- dynamisch befüllt -->
    </div>
    <div class="filter-row">
      <span class="filter-label">Suche</span>
      <input class="search-input" type="search" id="search-input"
             placeholder="Titel, Akteur, Datenobjekt, Beschreibung …"
             oninput="setSearch(this.value)">
    </div>
  </div>

  <div class="main">
    <div class="export-bar">
      <div class="counter" id="counter"></div>
      <button class="btn-export" id="btn-expand" onclick="toggleExpandAll()">⊞ Alle aufklappen</button>
      <button class="btn-export" onclick="exportPDF()" title="Druckansicht öffnen">↓ PDF</button>
      <button class="btn-export" onclick="exportCSV()" title="Sichtbare Schritte als CSV">↓ CSV</button>
      <button class="btn-export" onclick="exportJSON()" title="Sichtbare Schritte als JSON">↓ JSON</button>
    </div>
    <div id="karten"></div>
    <div id="matrix-view" style="display:none;"></div>
  </div>

  <div class="modal-overlay" id="step-modal" style="display:none;" onclick="closeModal(event)">
    <div class="modal-panel" id="modal-panel" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()">×</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="patientenpfad_data.js"></script>
  <script>
    // ── Konfiguration ────────────────────────────────────────────────
    const drBadgeClass = { portal:'dr-portal', versorgung:'dr-versorgung', epa:'dr-epa', ehds:'dr-ehds' };
    const drLabel      = { portal:'Portal', versorgung:'Versorgung', epa:'ePA', ehds:'EHDS' };
    const phaseLabel   = { vor:'Vor dem Krankenhaus', im:'Im Krankenhaus', nach:'Nach dem Krankenhaus' };
    const phaseBorder  = { vor:'phase-vor', im:'phase-im', nach:'phase-nach' };

    // ── Gesetzesgruppe aus einem Eintrag extrahieren ─────────────────
    function getLawGroup(gesetz) {
      return gesetz.split(/\s+(?:§|Art\.|Abs\.)/)[0].trim();
    }

    // ── Standardgruppe aus einem Eintrag extrahieren ─────────────────
    function getStandardGroup(s) {
      if (s.startsWith('HL7 FHIR'))                          return 'HL7 FHIR';
      if (s.startsWith('HL7'))                               return 'HL7';
      if (s.startsWith('IHE'))                               return 'IHE';
      if (s.startsWith('gematik'))                           return 'gematik';
      if (s.startsWith('KBV') || s.startsWith('ISiK'))      return 'KBV / ISiK';
      if (['SNOMED CT','LOINC','ICD-10-GM','OPS'].includes(s)) return 'Terminologien';
      return 'Sonstige';
    }

    // ── Alle Gruppen aus den Daten ermitteln ─────────────────────────
    const allLawGroups = [...new Set(
      data.flatMap(d => (d.gesetze || []).map(getLawGroup))
    )].sort();

    const allStandardGroups = [...new Set(
      data.flatMap(d => (d.standards || []).map(getStandardGroup))
    )].sort();

    // ── Filter-State ─────────────────────────────────────────────────
    const allStrukturen = ['strukturiert', 'teilstrukturiert', 'unstrukturiert'];

    let activeView       = 'karten';
    let activePhase      = 'alle';
    let activeDR         = new Set(['portal','versorgung','epa','ehds']);
    let activeStrukturen = new Set(allStrukturen);
    let activeLaws       = new Set(allLawGroups);
    let activeStandards  = new Set(allStandardGroups);
    let openCard         = null;
    let searchTerm       = '';
    let printMode        = false;
    let expandAll        = false;

    // ── Filter-Buttons dynamisch aufbauen ────────────────────────────
    const strRow = document.getElementById('str-filter-row');
    allStrukturen.forEach(val => {
      const btn = document.createElement('button');
      btn.className = 'str-toggle active';
      btn.dataset.str = val;
      btn.textContent = val;
      btn.onclick = () => toggleStruktur(val);
      strRow.appendChild(btn);
    });

    const lawRow = document.getElementById('law-filter-row');
    allLawGroups.forEach(group => {
      const btn = document.createElement('button');
      btn.className = 'law-toggle active';
      btn.dataset.law = group;
      btn.textContent = group;
      btn.onclick = () => toggleLaw(group);
      lawRow.appendChild(btn);
    });

    const stdRow = document.getElementById('std-filter-row');
    allStandardGroups.forEach(group => {
      const btn = document.createElement('button');
      btn.className = 'std-toggle active';
      btn.dataset.std = group;
      btn.textContent = group;
      btn.onclick = () => toggleStandard(group);
      stdRow.appendChild(btn);
    });

    // ── Event-Handler ────────────────────────────────────────────────
    function setPhase(p) {
      activePhase = p;
      document.querySelectorAll('.phase-tab').forEach((t, i) => {
        t.classList.toggle('active', ['alle','vor','im','nach'][i] === p);
      });
      render();
    }

    function toggleDR(dr) {
      activeDR.has(dr) ? activeDR.delete(dr) : activeDR.add(dr);
      document.querySelector(`[data-dr="${dr}"]`).classList.toggle('active', activeDR.has(dr));
      render();
    }

    function toggleLaw(group) {
      activeLaws.has(group) ? activeLaws.delete(group) : activeLaws.add(group);
      document.querySelector(`[data-law="${CSS.escape(group)}"]`).classList.toggle('active', activeLaws.has(group));
      render();
    }

    function toggleStandard(group) {
      activeStandards.has(group) ? activeStandards.delete(group) : activeStandards.add(group);
      document.querySelector(`[data-std="${CSS.escape(group)}"]`).classList.toggle('active', activeStandards.has(group));
      render();
    }

    function toggleStruktur(val) {
      activeStrukturen.has(val) ? activeStrukturen.delete(val) : activeStrukturen.add(val);
      document.querySelector(`[data-str="${val}"]`).classList.toggle('active', activeStrukturen.has(val));
      render();
    }

    function toggleDetail(nr) {
      expandAll = false;
      openCard  = openCard === nr ? null : nr;
      render();
    }

    function toggleExpandAll() {
      expandAll = !expandAll;
      openCard  = null;
      const btn = document.getElementById('btn-expand');
      btn.textContent = expandAll ? '⊟ Alle zuklappen' : '⊞ Alle aufklappen';
      render();
    }

    function setSearch(val) {
      searchTerm = val.trim();
      render();
    }

    function highlight(text, term) {
      if (!term) return text;
      const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
    }

    function matchesSearch(d) {
      if (!searchTerm) return true;
      const q = searchTerm.toLowerCase();
      return (
        d.titel.toLowerCase().includes(q) ||
        d.akteur.join(', ').toLowerCase().includes(q) ||
        d.objekt.join(' · ').toLowerCase().includes(q) ||
        d.detail.toLowerCase().includes(q)
      );
    }

    // ── Karte als HTML ───────────────────────────────────────────────
    function renderCard(d) {
      const hasDR        = d.dr.some(r => activeDR.has(r));
      const hasStruktur  = !d.struktur || activeStrukturen.has(d.struktur);
      const hasLaw       = !d.gesetze   || d.gesetze.length   === 0 || d.gesetze.some(g => activeLaws.has(getLawGroup(g)));
      const hasStandard  = !d.standards || d.standards.length === 0 || d.standards.some(s => activeStandards.has(getStandardGroup(s)));
      const dimmed = !hasDR || !hasStruktur || !hasLaw || !hasStandard;
      const isOpen = openCard === d.nr || printMode || expandAll;

      const drBadges = d.dr
        .map(r => `<span class="dr-badge ${drBadgeClass[r]}">${drLabel[r]}</span>`)
        .join('');

      let detailHtml = '';
      if (isOpen) {
        const domaene = d.domäne
          ? `<span class="domaene-chip">${d.domäne}</span>`
          : `<span style="color:var(--c-text-4);font-size:12px;">–</span>`;

        const gesetze = (d.gesetze || []).length
          ? d.gesetze.map(g => `<span class="gesetz-chip">${g}</span>`).join('')
          : `<span style="color:var(--c-text-4);font-size:12px;">–</span>`;

        detailHtml = `
          <div class="detail-box">
            <div>${highlight(d.detail, searchTerm)}</div>
            <div class="detail-section">
              <div class="detail-section-label">Informationsdomäne</div>
              ${domaene}
            </div>
            <div class="detail-section">
              <div class="detail-section-label">Rechtsgrundlagen <span style="font-weight:400;text-transform:none;letter-spacing:0;">(Entwurf)</span></div>
              <div>${gesetze}</div>
            </div>
            <div class="detail-section">
              <div class="detail-section-label">Standards <span style="font-weight:400;text-transform:none;letter-spacing:0;">(Entwurf)</span></div>
              <div>${(d.standards||[]).length ? d.standards.map(s=>`<span class="standard-chip">${highlight(s,searchTerm)}</span>`).join('') : '<span style="color:var(--c-text-4);font-size:12px;">–</span>'}</div>
            </div>
          </div>`;
      }

      return `
        <div class="prozess-card ${phaseBorder[d.phase]} ${dimmed ? 'dimmed' : ''} ${isOpen ? 'open' : ''}"
             data-nr="${d.nr}" onclick="toggleDetail(${d.nr})">
          <div class="card-meta">
            <span class="card-nr">#${String(d.nr).padStart(2,'0')}</span>
          </div>
          <div class="card-titel">${highlight(d.titel, searchTerm)}</div>
          <div class="card-akteur">${highlight(d.akteur.join(', '), searchTerm)}</div>
          <div class="card-objekt">
            ${highlight(d.objekt.join(' · '), searchTerm)}<span class="card-op">${d.op}</span>${d.struktur ? `<span class="struktur-badge struktur-${d.struktur}">${d.struktur}</span>` : ''}
          </div>
          <div class="card-badges">${drBadges}</div>
          ${detailHtml}
        </div>`;
    }

    // ── Render ───────────────────────────────────────────────────────
    function render() {
      const phases = activePhase === 'alle'
        ? ['vor', 'im', 'nach']
        : [activePhase];

      let totalVisible = 0;

      const sectionsHtml = phases.map(phase => {
        const phaseDaten = data
          .filter(d => d.phase === phase)
          .filter(matchesSearch);
        const visibleCount = phaseDaten.filter(d =>
          d.dr.some(r => activeDR.has(r)) &&
          (!d.struktur || activeStrukturen.has(d.struktur)) &&
          (d.gesetze   || []).some(g => activeLaws.has(getLawGroup(g))) &&
          (!d.standards || d.standards.length === 0 || d.standards.some(s => activeStandards.has(getStandardGroup(s))))
        ).length;
        totalVisible += visibleCount;

        const countLabel = visibleCount === phaseDaten.length
          ? `${phaseDaten.length} Schritte`
          : `${visibleCount} von ${phaseDaten.length} Schritten sichtbar`;

        return `
          <div class="phase-section">
            <div class="phase-section-header ${phaseBorder[phase]}">
              <span class="phase-section-title">${phaseLabel[phase]}</span>
              <span class="phase-section-count">${countLabel}</span>
            </div>
            <div class="phase-section-grid">
              ${phaseDaten.map(renderCard).join('')}
            </div>
          </div>`;
      }).join('');

      document.getElementById('counter').innerHTML =
        `<strong>${totalVisible} von ${data.length}</strong> Prozessschritten sichtbar`;

      document.getElementById('karten').innerHTML = sectionsHtml;

      // Print-Filterzeile aktualisieren
      const phaseText    = activePhase === 'alle' ? 'Alle Phasen' : phaseLabel[activePhase];
      const drText       = activeDR.size === 4 ? 'Alle Datenräume' : [...activeDR].map(r => drLabel[r]).join(', ');
      const strText      = activeStrukturen.size === allStrukturen.length ? null : `Struktur: ${[...activeStrukturen].join(', ')}`;
      const lawText      = activeLaws.size === allLawGroups.length ? 'Alle Rechtsgrundlagen' : [...activeLaws].join(', ');
      const stdText      = activeStandards.size === allStandardGroups.length ? null : `Standards: ${[...activeStandards].join(', ')}`;
      const searchText   = searchTerm ? `Suche: „${searchTerm}"` : null;
      const dateText     = new Date().toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric' });

      const parts = [
        `Phase: ${phaseText}`,
        `Datenräume: ${drText}`,
        strText,
        `Rechtsgrundlagen: ${lawText}`,
        stdText,
        searchText
      ].filter(Boolean).join(' · ');

      document.getElementById('print-filter-summary').innerHTML =
        `${parts}<br><span style="opacity:0.7">Exportiert: ${dateText} · ${totalVisible} von ${data.length} Prozessschritten</span>`;
    }

    render();

    // ── View-Switching ───────────────────────────────────────────────
    function switchView(view) {
      activeView = view;
      document.querySelectorAll('.view-tab').forEach((t, i) =>
        t.classList.toggle('active', ['karten','matrix'][i] === view)
      );
      const isKarten = view === 'karten';
      document.querySelector('.toolbar').style.display    = isKarten ? '' : 'none';
      document.querySelector('.export-bar').style.display = isKarten ? '' : 'none';
      document.getElementById('karten').style.display     = isKarten ? '' : 'none';
      document.getElementById('matrix-view').style.display = isKarten ? 'none' : '';
      if (!isKarten) renderMatrix();
    }

    // ── Matrix-Rendering ─────────────────────────────────────────────
    function renderMatrix() {
      const datenraeume = ['portal', 'versorgung', 'epa', 'ehds'];
      const domaenen    = meta.domaenen;

      const matrix = {};
      domaenen.forEach(d => {
        matrix[d] = {};
        datenraeume.forEach(dr => { matrix[d][dr] = []; });
      });
      data.forEach(step => {
        if (!step.domäne || !matrix[step.domäne]) return;
        step.dr.forEach(dr => { matrix[step.domäne][dr].push(step); });
      });

      const thDR = datenraeume.map(dr =>
        `<th><span class="dr-badge ${drBadgeClass[dr]}">${drLabel[dr]}</span></th>`
      ).join('');

      const rows = domaenen.map(domäne => {
        const cells = datenraeume.map(dr => {
          const steps = matrix[domäne][dr];
          if (!steps.length) return `<td></td>`;
          const chips = steps.map(s =>
            `<button class="matrix-step-chip phase-${s.phase}" data-nr="${s.nr}" onclick="openModal(${s.nr})">#${String(s.nr).padStart(2,'0')} ${s.titel}</button>`
          ).join('');
          return `<td>${chips}</td>`;
        }).join('');
        return `<tr><td class="matrix-domaene">${domäne}</td>${cells}</tr>`;
      }).join('');

      document.getElementById('matrix-view').innerHTML = `
        <div class="matrix-wrap">
          <table class="matrix-table">
            <thead><tr><th>Informationsdomäne</th>${thDR}</tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    function openModal(nr) {
      const d = data.find(s => s.nr === nr);
      if (!d) return;

      const drBadges = d.dr
        .map(r => `<span class="dr-badge ${drBadgeClass[r]}">${drLabel[r]}</span>`)
        .join('');
      const strukturBadge = d.struktur
        ? `<span class="struktur-badge struktur-${d.struktur}">${d.struktur}</span>` : '';
      const domaeneHtml = d.domäne
        ? `<span class="domaene-chip">${d.domäne}</span>`
        : `<span style="color:var(--c-text-4);font-size:12px;">–</span>`;
      const gesetzeHtml = (d.gesetze || []).length
        ? d.gesetze.map(g => `<span class="gesetz-chip">${g}</span>`).join('')
        : `<span style="color:var(--c-text-4);font-size:12px;">–</span>`;
      const standardsHtml = (d.standards || []).length
        ? d.standards.map(s => `<span class="standard-chip">${s}</span>`).join('')
        : `<span style="color:var(--c-text-4);font-size:12px;">–</span>`;

      document.getElementById('modal-content').innerHTML = `
        <div class="modal-nr">#${String(d.nr).padStart(2,'0')} · ${phaseLabel[d.phase]}</div>
        <div class="modal-titel">${d.titel}</div>
        <div class="modal-meta">${d.akteur.join(', ')}</div>
        <div class="modal-meta">${d.objekt.join(' · ')} <span class="card-op">${d.op}</span> ${strukturBadge}</div>
        <div class="modal-badges">${drBadges}</div>
        <hr class="modal-divider">
        <div style="font-size:13px;color:var(--c-text-2);line-height:1.65;">${d.detail}</div>
        <div class="detail-section" style="margin-top:12px;">
          <div class="detail-section-label">Informationsdomäne</div>
          ${domaeneHtml}
        </div>
        <div class="detail-section" style="margin-top:12px;">
          <div class="detail-section-label">Rechtsgrundlagen <span style="font-weight:400;text-transform:none;letter-spacing:0;">(Entwurf)</span></div>
          <div>${gesetzeHtml}</div>
        </div>
        <div class="detail-section" style="margin-top:12px;">
          <div class="detail-section-label">Standards <span style="font-weight:400;text-transform:none;letter-spacing:0;">(Entwurf)</span></div>
          <div>${standardsHtml}</div>
        </div>`;

      const panel = document.getElementById('modal-panel');
      panel.className = `modal-panel phase-${d.phase}`;
      document.getElementById('step-modal').style.display = 'flex';
    }

    function closeModal(e) {
      if (e && e.target !== document.getElementById('step-modal')) return;
      document.getElementById('step-modal').style.display = 'none';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') document.getElementById('step-modal').style.display = 'none';
    });

    // ── Matrix Cross-Highlighting ────────────────────────────────────
    const matrixEl = document.getElementById('matrix-view');
    matrixEl.addEventListener('mouseover', e => {
      const chip = e.target.closest('.matrix-step-chip');
      if (!chip) return;
      const nr = chip.dataset.nr;
      document.querySelectorAll('.matrix-step-chip').forEach(c => {
        const same = c.dataset.nr === nr;
        c.classList.toggle('highlighted',     same);
        c.classList.toggle('dimmed-by-hover', !same);
      });
    });
    matrixEl.addEventListener('mouseleave', () => {
      document.querySelectorAll('.matrix-step-chip').forEach(c =>
        c.classList.remove('highlighted', 'dimmed-by-hover')
      );
    });

    // ── Export-Funktionen ────────────────────────────────────────────

    function getVisibleData() {
      return data.filter(d =>
        (activePhase === 'alle' || d.phase === activePhase) &&
        matchesSearch(d) &&
        d.dr.some(r => activeDR.has(r)) &&
        (!d.struktur || activeStrukturen.has(d.struktur)) &&
        (d.gesetze || []).some(g => activeLaws.has(getLawGroup(g)))
      );
    }

    function exportPDF() {
      window.onbeforeprint = () => {
        printMode = true;
        render();
      };
      window.onafterprint = () => {
        printMode = false;
        render();
        window.onbeforeprint = null;
        window.onafterprint = null;
      };
      window.print();
    }

    function exportCSV() {
      const visible = getVisibleData();
      const cols = ['nr','phase','titel','akteur','objekt','op','dr','domäne','gesetze','detail'];
      const header = cols.join(';');
      const rows = visible.map(d => [
        d.nr,
        d.phase,
        `"${d.titel}"`,
        `"${d.akteur.join(', ')}"`,
        `"${d.objekt.join(', ')}"`,
        d.op,
        `"${d.dr.join(', ')}"`,
        `"${d.domäne || ''}"`,
        `"${(d.gesetze || []).join(', ')}"`,
        `"${d.detail.replace(/"/g, '""')}"`
      ].join(';'));

      const csv = '﻿' + [header, ...rows].join('\r\n');
      download('patientenpfad_export.csv', csv, 'text/csv;charset=utf-8');
    }

    function exportJSON() {
      const visible = getVisibleData();
      const json = JSON.stringify(visible, null, 2);
      download('patientenpfad_export.json', json, 'application/json');
    }

    function download(filename, content, type) {
      const blob = new Blob([content], { type });
      const url  = URL.createObjectURL(blob);
      const a    = Object.assign(document.createElement('a'), { href: url, download: filename });
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
