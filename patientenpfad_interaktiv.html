<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patientenpfad – Interaktive Prozesskarte</title>
  <style>
    :root {
      --c-text-1:   #111827;
      --c-text-2:   #374151;
      --c-text-3:   #6B7280;
      --c-text-4:   #9CA3AF;
      --c-bg:       #F3F4F6;
      --c-surface:  #ffffff;
      --c-border-1: #E5E7EB;
      --c-border-2: #D1D5DB;
      --c-border-3: #9CA3AF;
      --r-sm: 6px;
      --r-md: 8px;
      --r-lg: 12px;

      --phase-vor:  #059669;
      --phase-im:   #4F46E5;
      --phase-nach: #B45309;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--c-bg);
      color: var(--c-text-1);
      min-height: 100vh;
    }

    /* ── Header ── */
    .page-header {
      background: var(--c-surface);
      border-bottom: 1px solid var(--c-border-1);
      padding: 16px 24px 14px;
    }
    .page-header h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .page-header p {
      font-size: 12px;
      color: var(--c-text-3);
      margin-top: 3px;
    }

    /* ── Toolbar ── */
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--c-surface);
      border-bottom: 1px solid var(--c-border-1);
      padding: 12px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--c-text-4);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      min-width: 110px;
    }

    /* Phase-Tabs */
    .phase-tab {
      padding: 5px 13px;
      border: 1px solid var(--c-border-2);
      border-radius: var(--r-sm);
      background: transparent;
      color: var(--c-text-3);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.12s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .phase-tab:hover:not(.active) {
      border-color: var(--c-border-3);
      color: var(--c-text-2);
    }
    .phase-tab.active {
      background: var(--c-text-1);
      border-color: var(--c-text-1);
      color: #fff;
    }
    .phase-tab .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Datenraum-Toggles */
    .dr-toggle {
      padding: 4px 11px;
      border-radius: 20px;
      border: 1px solid transparent;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.12s;
      opacity: 0.35;
    }
    .dr-toggle.active { opacity: 1; }
    .dr-portal     { background: #DBEAFE; color: #1E40AF; border-color: #3B82F6; }
    .dr-versorgung { background: #D1FAE5; color: #065F46; border-color: #10B981; }
    .dr-epa        { background: #EDE9FE; color: #4C1D95; border-color: #7C3AED; }
    .dr-ehds       { background: #FEE2E2; color: #7F1D1D; border-color: #EF4444; }

    /* Rechtsgrundlagen-Toggles */
    .law-toggle {
      padding: 4px 10px;
      border-radius: var(--r-sm);
      border: 1px solid var(--c-border-2);
      background: var(--c-surface);
      color: var(--c-text-3);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s;
      opacity: 0.45;
    }
    .law-toggle.active {
      background: #F0FDF4;
      border-color: #4ADE80;
      color: #14532D;
      opacity: 1;
    }
    .law-toggle:hover:not(.active) {
      border-color: var(--c-border-3);
      color: var(--c-text-2);
      opacity: 0.8;
    }

    /* ── Hauptbereich ── */
    .main {
      padding: 20px 24px;
    }

    .counter {
      font-size: 12px;
      color: var(--c-text-3);
      margin-bottom: 14px;
    }
    .counter strong { color: var(--c-text-2); font-weight: 600; }

    /* ── Karten-Grid ── */
    #karten {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
    }

    .prozess-card {
      background: var(--c-surface);
      border: 1px solid var(--c-border-1);
      border-radius: var(--r-lg);
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color 0.12s, box-shadow 0.12s, opacity 0.15s;
      position: relative;
    }
    .prozess-card:hover {
      border-color: var(--c-border-3);
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .prozess-card.dimmed {
      opacity: 0.18;
      pointer-events: none;
    }
    .prozess-card.open {
      border-color: var(--c-border-3);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .phase-vor  { border-left: 3px solid var(--phase-vor); }
    .phase-im   { border-left: 3px solid var(--phase-im); }
    .phase-nach { border-left: 3px solid var(--phase-nach); }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .card-phase-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .phase-vor  .card-phase-label { color: var(--phase-vor); }
    .phase-im   .card-phase-label { color: var(--phase-im); }
    .phase-nach .card-phase-label { color: var(--phase-nach); }

    .card-nr {
      font-size: 11px;
      font-weight: 600;
      color: var(--c-text-4);
    }

    .card-titel {
      font-size: 14px;
      font-weight: 600;
      color: var(--c-text-1);
      line-height: 1.35;
      margin-bottom: 5px;
    }

    .card-akteur {
      font-size: 12px;
      color: var(--c-text-3);
      margin-bottom: 3px;
    }

    .card-objekt {
      font-size: 12px;
      color: var(--c-text-3);
      margin-bottom: 10px;
    }
    .card-op {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 4px;
      background: #F3F4F6;
      color: var(--c-text-3);
      border: 1px solid var(--c-border-2);
      margin-left: 4px;
      vertical-align: middle;
    }

    .card-badges { display: flex; flex-wrap: wrap; gap: 4px; }

    .dr-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }

    /* ── Detail-Box ── */
    .detail-box {
      margin-top: 12px;
      border-top: 1px solid var(--c-border-1);
      padding-top: 12px;
      font-size: 13px;
      color: var(--c-text-2);
      line-height: 1.65;
    }

    .detail-section {
      margin-top: 12px;
    }
    .detail-section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--c-text-4);
      margin-bottom: 6px;
    }

    .domaene-chip {
      display: inline-block;
      padding: 3px 10px;
      border-radius: var(--r-sm);
      font-size: 12px;
      font-weight: 500;
      background: #FEF9C3;
      color: #713F12;
      border: 1px solid #FDE68A;
    }

    .gesetz-chip {
      display: inline-block;
      padding: 3px 9px;
      border-radius: var(--r-sm);
      font-size: 11px;
      font-weight: 500;
      background: #F0FDF4;
      color: #14532D;
      border: 1px solid #BBF7D0;
      margin-right: 4px;
      margin-bottom: 4px;
    }

    /* ── Print ── */
    @media print {
      body { background: white; }
      .page-header { position: static; box-shadow: none; }
      .toolbar { display: none; }
      .main { padding: 12px 0; }
      .prozess-card { break-inside: avoid; cursor: default; box-shadow: none; }
      .prozess-card.dimmed { display: none; }
    }
  </style>
</head>
<body>

  <div class="page-header">
    <h1>Patientenpfad – Interaktive Prozesskarte</h1>
    <p>Akteur &times; Prozess &rarr; Datenobjekt &nbsp;&middot;&nbsp; 25 Schritte &nbsp;&middot;&nbsp; 3 Phasen &nbsp;&middot;&nbsp; 4 Datenräume</p>
  </div>

  <div class="toolbar">
    <div class="filter-row">
      <span class="filter-label">Phase</span>
      <button class="phase-tab active" onclick="setPhase('alle')">Alle Phasen</button>
      <button class="phase-tab" onclick="setPhase('vor')">
        <span class="dot" style="background:var(--phase-vor)"></span>Vor dem Krankenhaus
      </button>
      <button class="phase-tab" onclick="setPhase('im')">
        <span class="dot" style="background:var(--phase-im)"></span>Im Krankenhaus
      </button>
      <button class="phase-tab" onclick="setPhase('nach')">
        <span class="dot" style="background:var(--phase-nach)"></span>Nach dem Krankenhaus
      </button>
    </div>
    <div class="filter-row">
      <span class="filter-label">Datenraum</span>
      <button class="dr-toggle dr-portal     active" data-dr="portal"     onclick="toggleDR('portal')">Portal</button>
      <button class="dr-toggle dr-versorgung active" data-dr="versorgung" onclick="toggleDR('versorgung')">Versorgung</button>
      <button class="dr-toggle dr-epa        active" data-dr="epa"        onclick="toggleDR('epa')">ePA</button>
      <button class="dr-toggle dr-ehds       active" data-dr="ehds"       onclick="toggleDR('ehds')">EHDS</button>
    </div>
    <div class="filter-row" id="law-filter-row">
      <span class="filter-label">Rechtsgrundlage</span>
      <!-- dynamisch befüllt -->
    </div>
  </div>

  <div class="main">
    <div class="counter" id="counter"></div>
    <div id="karten"></div>
  </div>

  <script src="patientenpfad_data.js"></script>
  <script>
    // ── Konfiguration ────────────────────────────────────────────────
    const drBadgeClass = { portal:'dr-portal', versorgung:'dr-versorgung', epa:'dr-epa', ehds:'dr-ehds' };
    const drLabel      = { portal:'Portal', versorgung:'Versorgung', epa:'ePA', ehds:'EHDS' };
    const phaseLabel   = { vor:'Vor dem Krankenhaus', im:'Im Krankenhaus', nach:'Nach dem Krankenhaus' };
    const phaseBorder  = { vor:'phase-vor', im:'phase-im', nach:'phase-nach' };

    // ── Gesetzesgruppe aus einem Eintrag extrahieren ─────────────────
    function getLawGroup(gesetz) {
      return gesetz.split(/\s+(?:§|Art\.|Abs\.)/)[0].trim();
    }

    // ── Alle Gesetzesgruppen aus den Daten ermitteln ─────────────────
    const allLawGroups = [...new Set(
      data.flatMap(d => (d.gesetze || []).map(getLawGroup))
    )].sort();

    // ── Filter-State ─────────────────────────────────────────────────
    let activePhase = 'alle';
    let activeDR    = new Set(['portal','versorgung','epa','ehds']);
    let activeLaws  = new Set(allLawGroups);
    let openCard    = null;

    // ── Law-Filter-Buttons dynamisch aufbauen ────────────────────────
    const lawRow = document.getElementById('law-filter-row');
    allLawGroups.forEach(group => {
      const btn = document.createElement('button');
      btn.className = 'law-toggle active';
      btn.dataset.law = group;
      btn.textContent = group;
      btn.onclick = () => toggleLaw(group);
      lawRow.appendChild(btn);
    });

    // ── Event-Handler ────────────────────────────────────────────────
    function setPhase(p) {
      activePhase = p;
      document.querySelectorAll('.phase-tab').forEach((t, i) => {
        t.classList.toggle('active', ['alle','vor','im','nach'][i] === p);
      });
      render();
    }

    function toggleDR(dr) {
      activeDR.has(dr) ? activeDR.delete(dr) : activeDR.add(dr);
      document.querySelector(`[data-dr="${dr}"]`).classList.toggle('active', activeDR.has(dr));
      render();
    }

    function toggleLaw(group) {
      activeLaws.has(group) ? activeLaws.delete(group) : activeLaws.add(group);
      document.querySelector(`[data-law="${CSS.escape(group)}"]`).classList.toggle('active', activeLaws.has(group));
      render();
    }

    function toggleDetail(nr) {
      openCard = openCard === nr ? null : nr;
      render();
    }

    // ── Render ───────────────────────────────────────────────────────
    function render() {
      const filtered = data.filter(d =>
        activePhase === 'alle' || d.phase === activePhase
      );

      const visible = filtered.filter(d =>
        d.dr.some(r => activeDR.has(r)) &&
        (d.gesetze || []).some(g => activeLaws.has(getLawGroup(g)))
      );

      document.getElementById('counter').innerHTML =
        `<strong>${visible.length} von ${data.length}</strong> Prozessschritten sichtbar`;

      document.getElementById('karten').innerHTML = filtered.map(d => {
        const hasDR  = d.dr.some(r => activeDR.has(r));
        const hasLaw = !d.gesetze || d.gesetze.length === 0
          || d.gesetze.some(g => activeLaws.has(getLawGroup(g)));
        const dimmed = !hasDR || !hasLaw;
        const isOpen = openCard === d.nr;

        const drBadges = d.dr
          .map(r => `<span class="dr-badge ${drBadgeClass[r]}">${drLabel[r]}</span>`)
          .join('');

        let detailHtml = '';
        if (isOpen) {
          const domaene = d.domäne
            ? `<span class="domaene-chip">${d.domäne}</span>`
            : `<span style="color:var(--c-text-4);font-size:12px;">–</span>`;

          const gesetze = (d.gesetze || []).length
            ? d.gesetze.map(g => `<span class="gesetz-chip">${g}</span>`).join('')
            : `<span style="color:var(--c-text-4);font-size:12px;">–</span>`;

          detailHtml = `
            <div class="detail-box">
              <div>${d.detail}</div>
              <div class="detail-section">
                <div class="detail-section-label">Informationsdomäne</div>
                ${domaene}
              </div>
              <div class="detail-section">
                <div class="detail-section-label">Rechtsgrundlagen <span style="font-weight:400;text-transform:none;letter-spacing:0;">(Entwurf)</span></div>
                <div>${gesetze}</div>
              </div>
            </div>`;
        }

        return `
          <div class="prozess-card ${phaseBorder[d.phase]} ${dimmed ? 'dimmed' : ''} ${isOpen ? 'open' : ''}"
               onclick="toggleDetail(${d.nr})">
            <div class="card-meta">
              <span class="card-phase-label">${phaseLabel[d.phase]}</span>
              <span class="card-nr">#${String(d.nr).padStart(2,'0')}</span>
            </div>
            <div class="card-titel">${d.titel}</div>
            <div class="card-akteur">${d.akteur}</div>
            <div class="card-objekt">
              ${d.objekt}<span class="card-op">${d.op}</span>
            </div>
            <div class="card-badges">${drBadges}</div>
            ${detailHtml}
          </div>`;
      }).join('');
    }

    render();
  </script>
</body>
</html>
