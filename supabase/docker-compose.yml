services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      AUTHENTICATOR_PASSWORD: ${AUTHENTICATOR_PASSWORD}
      AUTH_ADMIN_PASSWORD: ${AUTH_ADMIN_PASSWORD}
    ports:
      - "${DB_PORT:-5435}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8026:8025"   # Web-UI zum Nachsehen versendeter Mails (Magic-Link, Bestätigung)

  auth:
    image: supabase/gotrue:v2.167.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: http://localhost:9999
      GOTRUE_SITE_URL: ${SITE_URL}

      GOTRUE_DB_DRIVER: postgres
      DATABASE_URL: postgres://supabase_auth_admin:${AUTH_ADMIN_PASSWORD}@db:5432/postgres

      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: "3600"

      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "false"

      GOTRUE_SMTP_HOST: mailpit
      GOTRUE_SMTP_PORT: "1025"
      GOTRUE_SMTP_USER: gotrue
      GOTRUE_SMTP_PASS: gotrue
      GOTRUE_SMTP_ADMIN_EMAIL: noreply@prozesslandkarte.local
      GOTRUE_SMTP_SENDER_NAME: "Prozesslandkarte (lokal)"

      # Institutionelles SSO (T10, Kandidat Microsoft Entra ID) — Scaffolding.
      # Standardmäßig deaktiviert/leer: eine echte App-Registrierung im
      # Entra-ID-Tenant der Organisation kann nicht lokal nachgebaut werden
      # (siehe supabase/README.md, Abschnitt SSO). Sobald Client-ID/-Secret
      # und Tenant-URL in .env eingetragen sind, hier auf "true" setzen und
      # ssoAzureEnabled in viewer-db/editor-db (index.html) ebenfalls auf
      # true stellen.
      GOTRUE_EXTERNAL_AZURE_ENABLED: ${SSO_AZURE_ENABLED:-false}
      GOTRUE_EXTERNAL_AZURE_CLIENT_ID: ${SSO_AZURE_CLIENT_ID:-}
      GOTRUE_EXTERNAL_AZURE_SECRET: ${SSO_AZURE_SECRET:-}
      GOTRUE_EXTERNAL_AZURE_REDIRECT_URI: ${SSO_AZURE_REDIRECT_URI:-}
      GOTRUE_EXTERNAL_AZURE_URL: ${SSO_AZURE_TENANT_URL:-}
    ports:
      - "9999:9999"

  rest:
    image: postgrest/postgrest:v12.2.3
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${AUTHENTICATOR_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      # false (Default in PostgREST v10+): setzt request.jwt.claim.<name> statt
      # der alten JSON-GUC request.jwt.claims. GoTrues eigene auth.uid()/auth.role()
      # (Migration 00_init_auth_schema) lesen genau dieses neue Format.
      PGRST_DB_USE_LEGACY_GUCS: "false"
    ports:
      - "${REST_PORT:-8001}:3000"

volumes:
  db-data:
